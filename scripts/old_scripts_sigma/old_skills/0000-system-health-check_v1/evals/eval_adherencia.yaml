# evals/eval_adherencia.yaml — 0000-system-health-check v1.0.0

id: eval-0000-adherencia-v1
skill_id: system-health-check
skill_version: "1.0.0"
adr_reference: ADR-013

expected_trajectory:
  - tool: load_service_registry
  - tool: ping_critical_services
  - tool: ping_optional_services
  - tool: evaluate_verdict
  - tool: write_health_report

thresholds:
  min_adherence_score: 0.95
  max_extra_tools: 0
  max_missing_tools: 0

invariants:
  - name: veredicto_siempre_emitido
    check: "report['verdict'] in ['HEALTHY','DEGRADED','BLOCKED']"

  - name: blocked_si_critico_cae
    check: >
      len(report['critical_services_down']) == 0 or
      report['verdict'] == 'BLOCKED'

  - name: sin_escritura_de_datos
    check: "len(written_tables) == 0"

  - name: trace_id_presente
    check: "report['trace_id'] is not None"

test_cases:
  - id: tc-hc-001-healthy
    description: "Todos los servicios UP — trayectoria completa"
    input_scenario: "hc-t001"
    expected_tool_sequence:
      - load_service_registry
      - ping_critical_services
      - ping_optional_services
      - evaluate_verdict
      - write_health_report
    expected_adherence_score: 1.0

  - id: tc-hc-002-blocked
    description: "Servicio crítico caído — trayectoria completa hasta BLOCKED"
    input_scenario: "hc-t003"
    expected_tool_sequence:
      - load_service_registry
      - ping_critical_services
      - ping_optional_services
      - evaluate_verdict
      - write_health_report
    expected_adherence_score: 1.0
    notes: "La trayectoria no cambia según el veredicto. El veredicto es el output."
