# policies.yaml — Políticas centralizadas del ecosistema SIGMA
# Versión: 1.0.0
# Estado: Operativo mínimo (Fase 3.4 del Roadmap Técnico)
#
# Este archivo gobierna dos clases de decisiones que requieren control
# centralizado, fuera del alcance de cualquier defaults.yaml individual:
#   1. Umbrales estadísticos sensibles (ADR-001) — ej. drift_threshold
#   2. Permisos estructurales de herramientas (ADR-005) — capa estructural
#      del Policy Server, evaluada en <5ms antes de la capa semántica.
#
# Ambas clases viven aquí por el mismo motivo: relajar un umbral
# estadístico crítico sin que nadie lo note es tan peligroso como
# relajar un permiso de acceso. La gobernanza de ambos debe ser
# auditable desde un único punto, no dispersa en cada skill.

# ── UMBRALES ESTADÍSTICOS (ADR-001) ───────────────────────────────────────
statistical_validator:
  drift_method: ks_test               # única opción soportada (no PSI, ver SKILL.md 0004 v1.0.1)
  drift_threshold: 0.05               # p-value bajo el cual se declara drift significativo
  leakage_correlation_threshold: 0.95 # correlación que activa REJECTED directo
  leakage_temporal_threshold: 0.85    # correlación Spearman que activa warning en pre_processing

# ── CAPA ESTRUCTURAL DEL POLICY SERVER (ADR-005) ──────────────────────────
# Reglas deterministas evaluadas antes de cualquier llamada a herramienta.
# Resuelven ~95% de las decisiones sin pasar a la capa semántica (LLM juez).
policy_server:
  environments:
    dev:
      deny_tools: ["deploy_netlify", "write_prod_table"]
      allow_tools: ["read_any", "write_dev_table", "write_test_table"]
    production:
      deny_tools: ["install_package"]
      require_approval: ["write_prod_table", "deploy_netlify"]

  roles:
    # Reconciliado con ADR-016 — "orchestrator" genérico se reemplaza
    # por director (único punto de HITL global y creación de Workers,
    # Tab. 1) + un rol por Engineer, aislados entre sí (ADR-016 §2.3:
    # un Engineer nunca invoca skills de otro Engineer).
    director:
      can_escalate_to_hitl: true
      can_spawn_workers: true
      allowed_tables_prefix: []   # el Director no escribe tablas de datos directamente
    engineer_datos:
      allowed_tables_prefix: ["_raw", "_dev", "_test", "_stg", "_cleaned", "_rejected"]
      denied_tables_prefix: ["_prod"]
      can_escalate_to_hitl: false   # escala al Director, nunca directo (ADR-016 Tab. 1)
    engineer_modelos:            # placeholder — sin skills reales hasta Rollout 2
      allowed_tables_prefix: []
      can_escalate_to_hitl: false
    engineer_auditor:            # placeholder — sin skills reales hasta Rollout 3
      allowed_tables_prefix: []
      can_escalate_to_hitl: false
      can_quarantine: true       # autoridad de cuarentena inmediata, ADR-019 §2.1bis.2

    data_cleanser:
      max_rows_per_write: 100000
      allowed_tables_prefix: ["_dev", "_test", "_stg", "_cleaned", "_rejected"]
      denied_tables_prefix: ["_prod"]
    data_ingestion:
      allowed_tables_prefix: ["_raw"]
      denied_tables_prefix: ["_prod"]
    statistical_validator:
      allowed_tables_prefix: []   # solo lectura, no escribe tablas de datos
      denied_tools: ["write_table", "modify_table"]

# ── PARALELISMO INTRA-SKILL (ADR-002) ──────────────────────────────────────
mapreduce:
  chain_strategy:
    # ADR-002: "en submodo Runtime, la estrategia chain requiere
    # confirmación explícita del operador" — campo que faltaba en este
    # archivo; sin esto, chain no debe ejecutarse en Runtime.
    enabled_in_runtime: false   # cambiar a true = confirmación explícita del operador
    redis_key_prefix: "sigma:chain"

# ── SANDBOXING DE EJECUCIÓN (ADR-017) ──────────────────────────────────────
# Aplica solo a código sin autoría humana previa: skills generados
# dinámicamente (ADR-014) y Workers (ADR-019 §2.1ter). No aplica a los
# skills de Rollout 1/2 de autoría humana (ADR-017 §2.1).
sandbox:
  runtime: docker              # docker (SIGMA-FE/LE/ME) | gvisor (SIGMA-HE, opcional)
  network: none                # deny-by-default, nunca allowlist (ADR-017 §2.3bis)
  filesystem_allowlist: []     # declarado por skill vía su propio defaults.yaml
  resource_limits:
    memory_mb: 512
    cpu_cores: 1
  latent_container_min_trust_level: 2   # ADR-014 v1.3 — reduce overhead sin relajar contención

  patterns:
    deny_if_output_contains:
      - regex: "(?i)(api_key|password|secret|token)\\s*=\\s*['\"][^'\"]{8,}"
        reason: "Posible credencial hardcodeada en output (ADR-010)"

# ── APROBACIÓN (ADR-004) ──────────────────────────────────────────────────
approval:
  notification_mechanism: redis       # redis (default) | webhook
  webhook_url: null                   # ${APPROVAL_WEBHOOK_URL} si notification_mechanism: webhook
  webhook_timeout_ms: 2000
  webhook_retries: 3
  approval_timeout_seconds: 300       # ADR-004 — timeout por defecto del polling a Redis

# ── FAIL-CLOSED (ADR-005) ─────────────────────────────────────────────────
# Si el Policy Server no responde dentro de este umbral, la llamada se
# bloquea automáticamente y se registra POLICY_SERVER_TIMEOUT en Langfuse.
policy_server_timeout_ms: 100
