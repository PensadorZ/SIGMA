# =============================================================================
# defaults.yaml — Skill 0000: system-health-check
# SIGMA v1.5 · Eco MultiAgentes 4 Skills 2 (fusión v2.0.0)
# Autor: Prof. Marx Agustín García Delgado
# =============================================================================
# NOTA: este archivo no existía hasta el cierre completo de 0000 como
# Skill (Opción B), igualando el estándar ya aplicado a 0001 y 0002.
# Antes, el timeout de verificación de servicios estaba hardcodeado
# dentro de skill.py — ahora es configurable, igual que el resto.
# =============================================================================

skill:
  id: "0000"
  name: "system-health-check"
  version: "2.0.0"
  sigma_variant: "${SIGMA_VARIANT:-Full}"

# -----------------------------------------------------------------------------
# Verificación de servicios
# -----------------------------------------------------------------------------
services:
  # Timeout por servicio verificado (Postgres, Redis, MinIO, Langfuse, Ollama).
  # Sin timeout, un servicio lento (no caído, sino lento) puede colgar el
  # arranque del pipeline indefinidamente — ver test_..._stress.py.
  timeout_seconds: "${SIGMA_HEALTHCHECK_TIMEOUT:-3.0}"

  # Clasificación crítico/opcional — leída realmente en tiempo de
  # ejecución por skill.py (run() → _build_output()) desde v2.0.1.
  # Cambiar qué servicio es crítico solo requiere editar esta lista,
  # ya no hace falta tocar código.
  critical:
    - postgres
    - minio
  optional:
    - redis
    - langfuse
    - ollama

# -----------------------------------------------------------------------------
# Variables de entorno críticas (ADR-010) — fallo inmediato si faltan
# -----------------------------------------------------------------------------
critical_env_vars:
  - POSTGRES_HOST
  - POSTGRES_DB
  - POSTGRES_USER
  - POSTGRES_PASSWORD
  - MINIO_ENDPOINT
  - MINIO_ACCESS_KEY
  - MINIO_SECRET_KEY

# -----------------------------------------------------------------------------
# Trazabilidad Langfuse
# -----------------------------------------------------------------------------
langfuse:
  trace_prefix: "system-health-check"
  events:
    - system-health-check.start
    - system-health-check.success
    - system-health-check.error
